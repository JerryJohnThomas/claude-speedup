<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 220px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 14px; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .dot.off { background: #555; box-shadow: none; }
    h1 { font-size: 13px; font-weight: 600; color: #fff; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    label { font-size: 12px; color: #aaa; }
    .switch { position: relative; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #444; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
    .slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
    input:checked + .slider { background: #4ade80; }
    input:checked + .slider:before { transform: translateX(16px); }
    select { background: #2a2a2a; border: 1px solid #333; color: #e0e0e0; font-size: 12px; padding: 3px 6px; border-radius: 6px; cursor: pointer; outline: none; }
    .divider { border: none; border-top: 1px solid #2a2a2a; margin: 10px 0; }
    .status { font-size: 11px; color: #4ade80; text-align: center; }
    .status.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    <h1>Claude Speed Fix</h1>
  </div>
  <div class="row">
    <label>Enabled</label>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="row">
    <label>Keep last N turns</label>
    <select id="keepLast">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4" selected>4</option>
      <option value="6">6</option>
      <option value="8">8</option>
      <option value="10">10</option>
    </select>
  </div>
  <hr class="divider">
  <p class="status" id="status">Lightning mode active</p>
  <script src="popup.js"></script>
</body>
</html>
